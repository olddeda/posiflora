server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/shops/[0-9]+/(telegram/(connect|status)|orders)$ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:8080;
    }

    location /swagger/ {
        proxy_pass http://backend:8080;
    }

    location /docs {
        proxy_pass http://backend:8080;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
