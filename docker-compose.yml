services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: posiflora
      POSTGRES_PASSWORD: posiflora
      POSTGRES_DB: posiflora
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posiflora"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://posiflora:posiflora@db:5432/posiflora?sslmode=disable
      PORT: 8080
      TELEGRAM_ENABLED: "false"
      ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "9090:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
