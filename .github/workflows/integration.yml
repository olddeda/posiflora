name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.4"

jobs:
  integration:
    name: Backend / Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: posiflora
          POSTGRES_PASSWORD: posiflora
          POSTGRES_DB: posiflora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Generate swagger docs
        working-directory: backend
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal

      - name: Run integration tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://posiflora:posiflora@127.0.0.1:5432/posiflora_test?sslmode=disable
        run: |
          go test -count=1 -p 1 -race -timeout=120s ./internal/...
